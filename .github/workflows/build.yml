name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.1.1'

    - name: Build Debug APK
      run: gradle assembleDebug --no-daemon

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: shecan-dns-debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30

    - name: Decode Keystore
      run: |
        printf '%s' "${{ secrets.KEYSTORE_B64 }}" | base64 -d > shecan-release.jks

    - name: Build and Sign Release APK
      run: |
        gradle assembleRelease --no-daemon \
          -Pandroid.injected.signing.store.file=$(pwd)/shecan-release.jks \
          -Pandroid.injected.signing.store.password=${{ secrets.KEY_STORE_PASSWORD }} \
          -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
          -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

    - name: Upload Signed Release APK
      uses: actions/upload-artifact@v4
      with:
        name: shecan-dns-release-signed
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30
